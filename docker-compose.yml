services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: parallel_worlds
      POSTGRES_USER: parallel_worlds
      POSTGRES_PASSWORD: parallel_worlds
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-parallel-worlds}"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://parallel_worlds:parallel_worlds@postgres:5432/parallel_worlds}"
      NEO4J_URI: "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-parallel-worlds}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      - postgres
      - neo4j
    ports:
      - "8000:8000"

  worker:
    build: ./workers/story-generator
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://parallel_worlds:parallel_worlds@postgres:5432/parallel_worlds}"
      NEO4J_URI: "${NEO4J_URI:-bolt://neo4j:7687}"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-parallel-worlds}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      - postgres
      - neo4j

  web:
    build: ./apps/web
    environment:
      VITE_API_BASE_URL: "http://localhost:8000"
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  neo4j-data:

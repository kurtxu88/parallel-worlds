name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the leading v'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version files
        run: |
          test "$(cat VERSION)" = "${{ steps.version.outputs.version }}"
          python3 scripts/verify-version.py

      - name: Install and test web app
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          npm run test

      - name: Verify python modules
        run: python3 -m compileall apps/api workers/story-generator

      - name: Build release assets
        run: bash scripts/package-release.sh "${{ steps.version.outputs.version }}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parallel-worlds-release-v${{ steps.version.outputs.version }}
          path: out/release/${{ steps.version.outputs.version }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          files: |
            out/release/${{ steps.version.outputs.version }}/parallel-worlds-src-v${{ steps.version.outputs.version }}.tar.gz
            out/release/${{ steps.version.outputs.version }}/parallel-worlds-web-dist-v${{ steps.version.outputs.version }}.zip
            out/release/${{ steps.version.outputs.version }}/checksums.txt
